<!doctype html>
<html lang="th">
<head>

<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="css/style.css" />
<link rel="icon" href="assets/favicon.svg" />

<title>Checklist Report | Laya Staff Task</title>
</head>
<body onload="loadChecklistPage()">
  <div class="container">
    <div class="header">
      <div class="brand">
        <div class="title">Checklist Report</div>
        <div class="subtitle">Manager Daily Checklist — The Taste</div>
      </div>
      <div class="pills">
        <button class="secondary" onclick="window.location.href='manager.html'">Back to Manager</button>
        <button class="secondary" onclick="doLogout()">Logout</button>
      </div>
    </div>

    <div class="card">
      <div class="grid two">
        <div>
          <label>Date</label>
          <input id="clDate" type="date" />
        </div>
        <div>
          <label>Shift</label>
          <select id="clShift">
            <option value="Morning">Morning</option>
            <option value="Afternoon">Afternoon</option>
          </select>
        </div>
      </div>

      <div class="grid two" style="margin-top:10px;">
        <div>
          <label>Outlet</label>
          <select id="clOutlet">
            <option value="The Taste">The Taste</option>
            <option value="The Mangrove">The Mangrove</option>
          </select>
        </div>
        <div>
          <label>Checked done by</label>
          <input id="clCheckedBy" placeholder="ชื่อผู้ตรวจ (Manager)" />
        </div>
      </div>

      <label>Note</label>
      <textarea id="clNote" placeholder="บันทึกเพิ่มเติม (ถ้ามี)"></textarea>

      <div class="actions" style="margin-top:10px;">
        <button class="secondary" id="clLoadBtn">Load</button>
        <button class="secondary" id="clMarkAllBtn">Mark all done</button>
        <button id="clSaveBtn" class="success">Save</button>
        <button class="secondary" id="clPrintBtn">Print</button>
      </div>

      <div class="hint">ระบบจะบันทึกลง Firestore: <code>manager_checklists/outlet_date_shift</code></div>
    </div>

    <div class="card" style="margin-top:14px;">
      <h3 style="margin:0 0 10px 0;">Daily Checklist Items</h3>
      <div class="small">ติ๊ก Done + ใส่ Remark/Action By ตามต้องการ</div>
      <div class="hr"></div>

      <div id="clContainer"></div>
    </div>

    <div class="footer">Checklist template from “Daily Checklist Restaurant (The Taste)”</div>
  </div>

<script src="js/firebase-config.js"></script>
<script src="js/firebase-init.js"></script>
<script src="js/auth.js"></script>
<script src="js/checklist.js"></script>
</body>
</html>
